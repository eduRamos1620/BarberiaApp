version: '3.8'

services:
  base-datos:
    image: postgres:15-alpine
    container_name: barberia_db_container
    restart: always
    environment:
      # Docker tomará los valores del archivo .env automáticamente
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: